name: Validate AIRspec

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install validator
        run: python -m pip install --disable-pip-version-check jsonschema

      - name: Validate conformance suite
        run: python conformance/runner.py

      - name: Validate samples
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from jsonschema import Draft202012Validator

          samples = sorted(path for path in Path("samples").glob("**/*.json") if "catalogs" not in path.parts)
          if not samples:
              raise SystemExit("No AIRspec samples found")

          validators = {}
          for sample_path in samples:
              document = json.loads(sample_path.read_text())
              version = document["airspec"]
              if version not in validators:
                  schema_path = Path("schema") / version / "airspec.schema.json"
                  schema = json.loads(schema_path.read_text())
                  Draft202012Validator.check_schema(schema)
                  validators[version] = Draft202012Validator(schema)
              validator = validators[version]
              errors = sorted(validator.iter_errors(document), key=lambda error: list(error.path))
              if errors:
                  details = "\n".join(f"{sample_path}: {error.message}" for error in errors)
                  raise SystemExit(details)
              print(f"valid: {sample_path}")
          PY
